<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <title>Botão do Whatsapp</title>
</head>
<body>


  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">

  <style>
    /* Animação shake */
    @keyframes shake {
      0% {
        transform: translate(1px, 1px) rotate(0deg);
      }

      10% {
        transform: translate(-1px, -2px) rotate(-1deg);
      }

      20% {
        transform: translate(-3px, 0px) rotate(1deg);
      }

      30% {
        transform: translate(3px, 2px) rotate(0deg);
      }

      40% {
        transform: translate(1px, -1px) rotate(1deg);
      }

      50% {
        transform: translate(-1px, 2px) rotate(-1deg);
      }

      60% {
        transform: translate(-3px, 1px) rotate(0deg);
      }

      70% {
        transform: translate(3px, 1px) rotate(-1deg);
      }

      80% {
        transform: translate(-1px, -1px) rotate(1deg);
      }

      90% {
        transform: translate(1px, 2px) rotate(0deg);
      }

      100% {
        transform: translate(1px, -2px) rotate(-1deg);
      }
    }

    /* Classe para o botão com animação */
    .whatsapp-button {
      position: fixed;
      width: 60px;
      height: 60px;
      bottom: 40px;
      right: 40px;
      background-color: #25d366;
      color: #FFF;
      border-radius: 50px;
      text-align: center;
      font-size: 30px;
      box-shadow: 1px 1px 2px #888;
      z-index: 1000;
      transition: all 0.3s ease;
    }

    /* Opção 1: Animação contínua */
    .whatsapp-button {
      animation: shake 1s infinite;
    }

    /* Opção 2: Animação apenas no hover */
    .whatsapp-button:hover {
      animation: shake 0.5s;
    }

    /* Opção 3: Animação que acontece a cada 5 segundos */
    .whatsapp-button {
      animation: shake 0.5s 5s infinite;
      /* começa após 5s, duração 0.5s, repete */
    }

    /* Estilo para o ícone */
    .whatsapp-button i {
      margin-top: 16px;
    }

    /* Efeito de pulso suave (alternativa) */
    @keyframes pulse {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.1);
      }

      100% {
        transform: scale(1);
      }
    }

    .whatsapp-button-pulse {
      animation: pulse 2s infinite;
    }
  </style>

  <!-- Botão WhatsApp com animação contínua -->
  <a href="https://wa.me/5511983711837?text=preciso%20de%20mais%20informações" class="whatsapp-button" target="_blank">
    <i class="fa fa-whatsapp"></i>
  </a>
    
</body>
</html>
